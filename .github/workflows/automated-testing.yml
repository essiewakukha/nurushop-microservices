name: NuruShop Automated Testing Pipeline

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint all services
        run: ruff check auth-service order-service notification-service

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        service:
          - auth-service
          - order-service
          - notification-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: pytest tests/ -v --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/test-results.xml

  integration-tests:
    name: Integration & Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install requests pytest

      - name: Build and start services
        run: docker compose up --build -d

      - name: Wait for services to be ready
        run: python scripts/wait_for_services.py

      - name: Run smoke tests
        run: python tests/smoke/smoke_test.py

      - name: Run integration tests
        run: pytest tests/integration/ -v

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down

  contract-tests:
    name: API Contract Tests
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Schemathesis
        run: pip install schemathesis requests

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for services
        run: python scripts/wait_for_services.py

      - name: Contract test auth service
        run: st run http://localhost:8000/openapi.json --checks all --max-examples 25

      - name: Contract test notification service
        run: st run http://localhost:8002/openapi.json --checks all --max-examples 25

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down 

  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit auth service dependencies
        run: pip-audit -r auth-service/requirements.txt

      - name: Audit order service dependencies
        run: pip-audit -r order-service/requirements.txt

      - name: Audit notification service dependencies
        run: pip-audit -r notification-service/requirements.txt

      - name: Build images for scanning
        run: docker compose build

      - name: Scan auth image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nurushop-microservices-auth-service:latest
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan order image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nurushop-microservices-order-service:latest
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan notification image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nurushop-microservices-notification-service:latest
          severity: CRITICAL,HIGH
          exit-code: "1"

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: contract-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pytest

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for services
        run: python scripts/wait_for_services.py

      - name: Run regression suite
        run: pytest tests/regression/ -v

      - name: Stop services
        if: always()
        run: docker compose down


  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: regression-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for services
        run: |
          pip install requests
          python scripts/wait_for_services.py

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run load test
        run: k6 run tests/performance/load-test.js

      - name: Stop services
        if: always()
        run: docker compose down                           